<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="estilos/estilos.css" />
    <title>Multimedia</title>
    <style>
        html{
            padding: 1em;
            background: linear-gradient(to bottom, rgb(210,190,190), aquamarine, rgb(210,190,190));
            background-position: top left; 
            background-attachment:scroll;

        }
        #futbol{
            border: 1px black solid;
            padding: 4em;
            color: whitesmoke;
            background-color: red;
            background-size:contain;
            width: auto;
            background-repeat: no-repeat;
            background-position: bottom right;
            background-clip:content-box;
            background-origin: padding-box;            
        }
    </style>
</head>

<body>
    <figure>
        <img src="https://lenguajehtml.com/assets/logo.png" alt="Logotipo de HTML5">
        <figcaption>Logotipo oficial del lenguaje de marcas HTML5.</figcaption>
      </figure>

    <div id="futbol">
        <p>Probando la imagen de fondo del div</p>
    </div>

    <div>
        <h1>Imágenes</h1>

        <img src="img/descarga.jpeg" alt="Capibaras" width="400" height="300" />
        <p>
            Más informaciónde Capibaras (en negrita)
            <a href="https://es.wikipedia.org/wiki/Hydrochoerus_hydrochaeris" target="_blank">aquí</a>
        </p>
    </div>

    <div>
        <h1 class="especial">Videos</h1>
        <video width="200" height="200" autoplay controls muted loop>
            <source src="video/Zeppelin_Explodes.webm" type="video/webm" />
        </video>

        <video src="video/Zeppelin_Explodes.webm"></video>
    </div>

    <div>
        <h1 class="especial">Audios</h1>
        <audio src="audio/Frase_de_Neil_Armstrong.mp3" controls></audio>
    </div>

    <div>
        <h1>Objetos embebidos</h1>
        <iframe width="250" height="100" src="https://www.youtube.com/embed/qYwlqx-JLok?si=AVTBEffMoV9OHdPL"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        <iframe src="https://mediateca.educa.madrid.org/video/pqjtua8xktbuwb44/fs" width="420" height="315"
            frameborder="0" scrolling="no" style="border: 0; overflow: hidden" allowfullscreen></iframe>
    </div>

    <div>
        <h1>Donde estamos</h1>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3038.0992536124177!2d-3.6024705247331283!3d40.40665195625381!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd42255d3a247575%3A0xd8a0a40edf810cff!2sIES%20Villablanca!5e0!3m2!1ses!2ses!4v1696875342692!5m2!1ses!2ses"
            width="600" height="450" style="border: 0" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe> 
            <p>Parrafo que no es hijo de un div (no en negrita)</p>
    </div>
   
</body>

</html>

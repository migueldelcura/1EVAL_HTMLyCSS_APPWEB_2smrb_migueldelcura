<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ej. tablas</title>
    <style>
        caption{
            caption-side: bottom;
            background-color: yellow;
            color: white;
            text-align: left;
            width: fit-content;
            border-color: red;
            border-width: 1px;
            border-style: solid;
        }
        table{
            margin-left: auto;
            margin-right: auto;
            border: blue 1px dotted;
            border-collapse: separate;
            empty-cells: hide;
            border-spacing: 15px;

        }

        td{
            border: red 1px solid;
        }

        td.especial{
            border: yellow 1px solid;
            background-color: green;
        }
    </style>
</head>
<body>
    <table>
        <tr></tr><td>2</td>
        <tr></tr><td>3</td>
        <tr></tr><td>4</td>
    </table>
    <table>

            <tr>
                <th>Caecera 1</th>
                <th>Caecera 2</th>
                <th>Caecera 3</th>
                <th>Caecera 4</th>
                <th>Caecera 5</th>
            </tr>
        </thead>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td></td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
        </tr>
        <tr>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
            <td class="especial">13</td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>

            <td></td>

            <td></td>
        </tr>
        <tr>
            <td></td>

        </tr>
        <tr>
            <td></td>

            <td></td>
        </tr>
    </table>
</body>
</html>

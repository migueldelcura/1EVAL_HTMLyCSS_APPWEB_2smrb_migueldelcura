<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilos a tablas</title>
    <style>
        thead, tfoot {
            background-color: brown;
            color: white;
            text-transform: uppercase;
        }

        td:last-child{
            font-weight: bold;
        }

        tbody>tr:nth-child(odd){
            background-color: lightskyblue;
            color: white;
        }

        tbody>tr:nth-child(even){
            background-color: white;
            color: lightskyblue;
        }

    </style>
</head>

<body>
    <table>
        <caption>Tabla con estilos</caption>
        <thead>
            <tr>
                <td>Concepto</td>
                <td>Primer Semestre</td>
                <td>Segundo Semestre</td>
                <td>Total</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alimentación</td>
                <td>1500</td>
                <td>1750</td>
                <td>3250</td>
            </tr>
            <tr>
                <td>Tecnología</td>
                <td>1500</td>
                <td>1750</td>
                <td>3250</td>
            </tr>
            <tr>
                <td>Deporte</td>
                <td>1500</td>
                <td>1750</td>
                <td>3250</td>
            </tr>
            <tr>
                <td>Calzado</td>
                <td>1500</td>
                <td>1750</td>
                <td>3250</td>
            </tr>
            <tr>
                <td>Viajes</td>
                <td>1500</td>
                <td>1750</td>
                <td>3250</td>
            </tr>
            <tr>
                <td>Papelería</td>
                <td>1500</td>
                <td>1750</td>
                <td>3250</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>0000</td>
                <td>0000</td>
                <td>0000</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
